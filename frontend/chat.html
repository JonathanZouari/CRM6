<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightCRM — Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><span>&#9992;</span> FlightCRM</div>
        <div class="navbar-links">
            <a href="index.html">Customers</a>
            <a href="chat.html" class="active">Chat</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="chat-welcome-illustration">
                <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Chat bubble body -->
                    <rect x="15" y="20" width="90" height="60" rx="12" fill="#e0f2fe"/>
                    <polygon points="35,80 45,80 30,95" fill="#e0f2fe"/>
                    <!-- Dots -->
                    <circle cx="45" cy="50" r="5" fill="#0284c7" opacity="0.6"/>
                    <circle cx="60" cy="50" r="5" fill="#0284c7" opacity="0.4"/>
                    <circle cx="75" cy="50" r="5" fill="#0284c7" opacity="0.2"/>
                    <!-- Sparkle -->
                    <path d="M95 15 L97 20 L102 22 L97 24 L95 29 L93 24 L88 22 L93 20Z" fill="#d97706" opacity="0.5"/>
                    <circle cx="18" cy="30" r="2" fill="#6366f1" opacity="0.4"/>
                </svg>
            </div>
            <div class="chat-bubble assistant">
                Hi! I'm your CRM assistant. Ask me about customers, orders, revenue, or tasks.
            </div>
        </div>

        <div class="chat-suggestions" id="suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion(this)">How many customers are late?</button>
            <button class="suggestion-chip" onclick="sendSuggestion(this)">Total revenue this month?</button>
            <button class="suggestion-chip" onclick="sendSuggestion(this)">Upcoming departures?</button>
            <button class="suggestion-chip" onclick="sendSuggestion(this)">Open tasks?</button>
            <button class="suggestion-chip" onclick="sendSuggestion(this)">Order statistics?</button>
        </div>

        <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="Ask a question..."
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">&#10148;</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
